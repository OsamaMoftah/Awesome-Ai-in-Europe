name: Validate Links

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  awesome_bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.0"

      - name: Install awesome_bot
        run: gem install awesome_bot

      - name: Check links
        run: |
          awesome_bot README.md \
          sections/inference-providers.md \
          sections/datasets-gdpr-safe.md \
          sections/eu-ai-act-tooling.md \
          sections/grants-compute.md \
          sections/models.md \
          sections/multilingual.md \
          sections/research-labs.md \
          sections/communities.md \
          --allow-redirect \
          --allow-dupe \
          --skip-save-results \
          --white-list reddit.com,youtube.com,swissai.org,serbia-ai.rs,ai-portugal.org,lietuvosai.lt,malta-ai.org,telekom.com
